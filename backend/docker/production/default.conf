server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Security headers (defense-in-depth with Laravel middleware)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check endpoints — no rate limiting
    location = /api/v1/health/live {
        try_files $uri /index.php?$query_string;
    }

    location = /api/v1/health {
        try_files $uri /index.php?$query_string;
    }

    # Auth endpoints — strict rate limiting
    location ~ ^/api/v1/auth/(login|register|forgot-password|reset-password) {
        limit_req zone=auth burst=10 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # Screenshot upload — moderate rate limiting
    location = /api/v1/screenshots {
        limit_req zone=uploads burst=20 nodelay;
        client_max_body_size 10M;
        try_files $uri /index.php?$query_string;
    }

    # API routes — standard rate limiting
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        try_files $uri /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 60s;
    }

    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
