name: Tests

on:
  push:
    branches:
      - main
      - '*.x'
      - fix/web-frontend-and-desktop-app
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: trackflow
          POSTGRES_PASSWORD: trackflow_test
          POSTGRES_DB: trackflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trackflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: true
      matrix:
        php: [8.4]

    name: PHP ${{ matrix.php }}

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_pgsql, pgsql, redis, gd, bcmath
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run database migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: trackflow_test
          DB_USERNAME: trackflow
          DB_PASSWORD: trackflow_test

      - name: Execute tests
        run: php artisan test --exclude-group=external
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: trackflow_test
          DB_USERNAME: trackflow
          DB_PASSWORD: trackflow_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

      - name: Audit PHP dependencies for vulnerabilities
        if: always()
        continue-on-error: true
        run: composer audit

  frontend-checks:
    runs-on: ubuntu-latest
    name: Frontend (TypeScript + Audit)
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Audit production dependencies for vulnerabilities (non-blocking)
        if: always()
        continue-on-error: true
        run: npm audit --audit-level=high --omit=dev

      - name: Audit dev dependencies (non-blocking)
        if: always()
        continue-on-error: true
        run: npm audit --audit-level=high

  marketing-checks:
    runs-on: ubuntu-latest
    name: Marketing (TypeScript + Build)
    defaults:
      run:
        working-directory: marketing
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: marketing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Audit dependencies (non-blocking)
        if: always()
        continue-on-error: true
        run: npm audit --audit-level=high
