# ═══════════════════════════════════════════════════════════════════════════════
# TrackFlow — Build, Test & Deploy Pipeline
# ═══════════════════════════════════════════════════════════════════════════════
#
# Builds Docker images on GitHub Actions runners (NOT on the server — avoids
# OOM on the resource-constrained production host), pushes to GHCR, then
# deploys to production via SSH with zero-downtime rolling restarts.
#
# Pipeline gates (all must pass before deploy):
#   1. PHPUnit tests (with PostgreSQL + Redis service containers)
#   2. TypeScript type check (npx tsc --noEmit)
#   3. Docker image build (must succeed)
#   4. Post-deploy health check (rollback on failure)
#
# Triggers:
#   - Push to main (auto-deploy, only changed services)
#   - Manual dispatch (choose which services to build/deploy)
#
# Required secrets:
#   DEPLOY_SSH_KEY       — SSH private key for production server access
#   DEPLOY_HOST          — Production server IP or hostname
#   DEPLOY_USER          — SSH user on production server (e.g. ubuntu)
#   GITHUB_TOKEN         — Auto-provided by GitHub Actions for GHCR auth
#
# Optional secrets:
#   NEXT_PUBLIC_POSTHOG_KEY      — PostHog analytics key (baked into web image)
#   NEXT_PUBLIC_GOOGLE_CLIENT_ID — Google OAuth client ID (baked into web image)
#
# Zero-downtime strategy:
#   1. Build new Docker image in GitHub Actions runner (not on server)
#   2. Push image to ghcr.io
#   3. SSH to server: docker compose pull (download only, no restart)
#   4. Rolling restart: recreate containers one at a time
#   5. Health check gate: wait for all containers to report (healthy)
#   6. Automatic rollback if health check fails within 90 seconds
#
# ═══════════════════════════════════════════════════════════════════════════════

name: Build & Deploy

on:
  push:
    branches:
      - main
      - fix/web-frontend-and-desktop-app
    paths:
      - 'backend/**'
      - 'web/**'
      - 'marketing/**'
  workflow_dispatch:
    inputs:
      service:
        description: 'Which service to build and deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - web
          - marketing

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/codeupscale/trackflow-api
  WEB_IMAGE: ghcr.io/codeupscale/trackflow-web
  MARKETING_IMAGE: ghcr.io/codeupscale/trackflow-marketing

# Only one deploy at a time. Queue new runs, don't cancel in-flight deploys.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:

  # ─── CHANGE DETECTION ─────────────────────────────────────────────────────
  # Determines which services need building based on file changes.
  # Skipped for workflow_dispatch (user picks explicitly).

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      marketing: ${{ steps.filter.outputs.marketing }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            web:
              - 'web/**'
            marketing:
              - 'marketing/**'

  # ─── GATE: BACKEND TESTS ─────────────────────────────────────────────────
  # PHPUnit must pass before any deploy. Uses PostgreSQL + Redis service
  # containers to match production environment.

  test-backend:
    name: Backend tests (PHPUnit)
    runs-on: ubuntu-latest
    needs: [changes]
    if: >-
      always() && ((needs.changes.result == 'skipped' && (github.event.inputs.service == 'all' || github.event.inputs.service == 'backend')) || (needs.changes.result == 'success' && needs.changes.outputs.backend == 'true'))
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: trackflow
          POSTGRES_PASSWORD: trackflow_test
          POSTGRES_DB: trackflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trackflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_pgsql, pgsql, redis, gd, bcmath
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: trackflow_test
          DB_USERNAME: trackflow
          DB_PASSWORD: trackflow_test

      - name: Run PHPUnit tests
        run: php artisan test --exclude-group=external
        env:
          APP_ENV: testing
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: trackflow_test
          DB_USERNAME: trackflow
          DB_PASSWORD: trackflow_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

      - name: Audit PHP dependencies (non-blocking)
        if: always()
        continue-on-error: true
        run: composer audit

  # ─── GATE: FRONTEND TYPE CHECK ───────────────────────────────────────────
  # TypeScript must compile cleanly. Also runs npm audit as a warning.

  test-frontend:
    name: Frontend type check
    runs-on: ubuntu-latest
    needs: [changes]
    if: >-
      always() && ((needs.changes.result == 'skipped' && (github.event.inputs.service == 'all' || github.event.inputs.service == 'web')) || (needs.changes.result == 'success' && needs.changes.outputs.web == 'true'))
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Audit frontend dependencies (non-blocking)
        if: always()
        continue-on-error: true
        run: npm audit --audit-level=critical

  # ─── BUILD BACKEND IMAGE ──────────────────────────────────────────────────
  # Built on GitHub Actions runner (NOT on the server) to avoid OOM.

  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    needs: [changes, test-backend]
    if: >-
      always() && (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') && ((needs.changes.result == 'skipped' && (github.event.inputs.service == 'all' || github.event.inputs.service == 'backend')) || (needs.changes.result == 'success' && needs.changes.outputs.backend == 'true'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile.production
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  # ─── BUILD WEB IMAGE ─────────────────────────────────────────────────────

  build-web:
    name: Build Web image
    runs-on: ubuntu-latest
    needs: [changes, test-frontend]
    if: >-
      always() && (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped') && ((needs.changes.result == 'skipped' && (github.event.inputs.service == 'all' || github.event.inputs.service == 'web')) || (needs.changes.result == 'success' && needs.changes.outputs.web == 'true'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile.production
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=https://trackflow.codeupscale.com/api/v1
            NEXT_PUBLIC_REVERB_APP_KEY=trackflow-key
            NEXT_PUBLIC_REVERB_HOST=trackflow.codeupscale.com
            NEXT_PUBLIC_REVERB_PORT=8081
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=https://us.i.posthog.com
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # ─── GATE: MARKETING TYPE CHECK ──────────────────────────────────────────
  # TypeScript must compile cleanly before building marketing image.

  test-marketing:
    name: Marketing type check
    runs-on: ubuntu-latest
    needs: [changes]
    if: >-
      always() && ((needs.changes.result == 'skipped' && (github.event.inputs.service == 'all' || github.event.inputs.service == 'marketing')) || (needs.changes.result == 'success' && needs.changes.outputs.marketing == 'true'))
    defaults:
      run:
        working-directory: marketing
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: marketing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Audit dependencies (non-blocking)
        if: always()
        continue-on-error: true
        run: npm audit --audit-level=critical

  # ─── BUILD MARKETING IMAGE ──────────────────────────────────────────────

  build-marketing:
    name: Build Marketing image
    runs-on: ubuntu-latest
    needs: [changes, test-marketing]
    if: >-
      always() && (needs.test-marketing.result == 'success' || needs.test-marketing.result == 'skipped') && ((needs.changes.result == 'skipped' && (github.event.inputs.service == 'all' || github.event.inputs.service == 'marketing')) || (needs.changes.result == 'success' && needs.changes.outputs.marketing == 'true'))
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Marketing image
        uses: docker/build-push-action@v6
        with:
          context: marketing
          file: marketing/Dockerfile.production
          push: true
          tags: |
            ${{ env.MARKETING_IMAGE }}:latest
            ${{ env.MARKETING_IMAGE }}:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha,scope=marketing
          cache-to: type=gha,mode=max,scope=marketing

  # ─── DEPLOY TO PRODUCTION ────────────────────────────────────────────────
  # Zero-downtime deployment:
  #   1. Pull new images (old containers keep running)
  #   2. Recreate containers one at a time (rolling restart)
  #   3. Health check gate — wait for (healthy) status
  #   4. Automatic rollback if health check fails within 90 seconds
  #
  # IMPORTANT: Never runs `docker compose build` on the server.
  # Images are pre-built in GitHub Actions and pulled via GHCR.

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [changes, build-api, build-web, build-marketing]
    if: >-
      always() && (needs.build-api.result == 'success' || needs.build-api.result == 'skipped') && (needs.build-web.result == 'success' || needs.build-web.result == 'skipped') && (needs.build-marketing.result == 'success' || needs.build-marketing.result == 'skipped') && !(needs.build-api.result == 'skipped' && needs.build-web.result == 'skipped' && needs.build-marketing.result == 'skipped')
    environment: production
    steps:
      - name: Determine which services changed
        id: services
        run: |
          # For workflow_dispatch, use the input. For push, use change detection.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ github.event.inputs.service }}" in
              all)       echo "api=true" >> $GITHUB_OUTPUT; echo "web=true" >> $GITHUB_OUTPUT; echo "marketing=true" >> $GITHUB_OUTPUT ;;
              backend)   echo "api=true" >> $GITHUB_OUTPUT; echo "web=false" >> $GITHUB_OUTPUT; echo "marketing=false" >> $GITHUB_OUTPUT ;;
              web)       echo "api=false" >> $GITHUB_OUTPUT; echo "web=true" >> $GITHUB_OUTPUT; echo "marketing=false" >> $GITHUB_OUTPUT ;;
              marketing) echo "api=false" >> $GITHUB_OUTPUT; echo "web=false" >> $GITHUB_OUTPUT; echo "marketing=true" >> $GITHUB_OUTPUT ;;
            esac
          else
            echo "api=${{ needs.changes.outputs.backend }}" >> $GITHUB_OUTPUT
            echo "web=${{ needs.changes.outputs.web }}" >> $GITHUB_OUTPUT
            echo "marketing=${{ needs.changes.outputs.marketing }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH (zero-downtime rolling restart)
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_API: ${{ steps.services.outputs.api }}
          DEPLOY_WEB: ${{ steps.services.outputs.web }}
          DEPLOY_MARKETING: ${{ steps.services.outputs.marketing }}
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_API,DEPLOY_WEB,DEPLOY_MARKETING,GH_ACTOR,GH_TOKEN,COMMIT_SHA
          command_timeout: 5m
          script: |
            set -euo pipefail
            cd /home/ubuntu/infra

            echo "==> Logging in to GitHub Container Registry"
            echo "${GH_TOKEN}" | docker login ghcr.io -u "${GH_ACTOR}" --password-stdin

            # ── 0. FULL STACK TEARDOWN before redeploy ──
            # docker compose down tears down containers AND their network endpoints
            # (including docker-proxy processes that hold port bindings).
            # --remove-orphans also kills containers from old service names (pre tf- rename).
            # This is the only reliable way to clear Docker's internal port-allocation map.
            echo "==> Tearing down existing stack (frees all port bindings)"
            docker compose down --remove-orphans --timeout 30 2>/dev/null || true
            # Belt-and-suspenders: kill any remaining docker-proxy on ports we use
            for port in 8080 3001 3002 8081; do
              fuser -k ${port}/tcp 2>/dev/null || true
            done

            # ── 1. SNAPSHOT: Record current image digests for rollback ──

            API_OLD_DIGEST=""
            WEB_OLD_DIGEST=""
            MARKETING_OLD_DIGEST=""
            if [ "${DEPLOY_API}" = "true" ]; then
              API_OLD_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/codeupscale/trackflow-api:latest 2>/dev/null || echo "")
              echo "==> Current API digest: ${API_OLD_DIGEST:-none}"
            fi
            if [ "${DEPLOY_WEB}" = "true" ]; then
              WEB_OLD_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/codeupscale/trackflow-web:latest 2>/dev/null || echo "")
              echo "==> Current Web digest: ${WEB_OLD_DIGEST:-none}"
            fi
            if [ "${DEPLOY_MARKETING}" = "true" ]; then
              MARKETING_OLD_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ghcr.io/codeupscale/trackflow-marketing:latest 2>/dev/null || echo "")
              echo "==> Current Marketing digest: ${MARKETING_OLD_DIGEST:-none}"
            fi

            # ── 2. PULL: Download new images (old containers keep serving traffic) ──

            if [ "${DEPLOY_API}" = "true" ]; then
              echo "==> Pulling API image (sha: ${COMMIT_SHA:0:8})"
              docker pull ghcr.io/codeupscale/trackflow-api:latest
            fi
            if [ "${DEPLOY_WEB}" = "true" ]; then
              echo "==> Pulling Web image (sha: ${COMMIT_SHA:0:8})"
              docker pull ghcr.io/codeupscale/trackflow-web:latest
            fi
            if [ "${DEPLOY_MARKETING}" = "true" ]; then
              echo "==> Pulling Marketing image (sha: ${COMMIT_SHA:0:8})"
              docker pull ghcr.io/codeupscale/trackflow-marketing:latest
            fi

            # ── 3. ROLLING RESTART: Recreate containers one at a time ──
            # Each container's stop_grace_period (configured in compose) ensures
            # in-flight requests complete before the old container is killed.

            if [ "${DEPLOY_API}" = "true" ]; then
              echo "==> Rolling restart: tf-app"
              docker compose up -d --no-deps tf-app

              echo "==> Running migrations"
              docker compose exec tf-app php artisan migrate --force || true

              echo "==> Rolling restart: tf-horizon"
              docker compose up -d --no-deps tf-horizon
              docker compose exec tf-horizon php artisan horizon:terminate 2>/dev/null || true

              echo "==> Rolling restart: tf-scheduler"
              docker compose up -d --no-deps tf-scheduler

              echo "==> Rolling restart: tf-reverb"
              docker compose up -d --no-deps tf-reverb
            fi

            if [ "${DEPLOY_WEB}" = "true" ]; then
              echo "==> Rolling restart: tf-web"
              docker compose up -d --no-deps tf-web
            fi

            if [ "${DEPLOY_MARKETING}" = "true" ]; then
              echo "==> Rolling restart: tf-marketing"
              docker compose up -d --no-deps tf-marketing
            fi

            # ── 4. HEALTH CHECK GATE ──
            # Wait up to 90 seconds for all TrackFlow containers to report healthy.
            # If any container fails health check, trigger rollback.

            echo "==> Waiting for containers to become healthy (timeout: 90s)..."
            HEALTH_OK=true
            SERVICES_TO_CHECK=""

            if [ "${DEPLOY_API}" = "true" ]; then
              SERVICES_TO_CHECK="tf-app tf-horizon tf-scheduler tf-reverb"
            fi
            if [ "${DEPLOY_WEB}" = "true" ]; then
              SERVICES_TO_CHECK="${SERVICES_TO_CHECK} tf-web"
            fi
            if [ "${DEPLOY_MARKETING}" = "true" ]; then
              SERVICES_TO_CHECK="${SERVICES_TO_CHECK} tf-marketing"
            fi

            for svc in ${SERVICES_TO_CHECK}; do
              echo "  Checking health: ${svc}..."
              ATTEMPTS=0
              MAX_ATTEMPTS=18  # 18 * 5s = 90s
              while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
                # Check if container exists first
                CONTAINER_EXISTS=$(docker inspect "infra-${svc}-1" > /dev/null 2>&1 && echo "yes" || echo "no")
                if [ "${CONTAINER_EXISTS}" = "no" ]; then
                  ATTEMPTS=$((ATTEMPTS + 1))
                  if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
                    echo "  [FAIL] ${svc} container never started"
                    HEALTH_OK=false
                  fi
                  sleep 5
                  continue
                fi

                # Check if container has a healthcheck defined
                HAS_HEALTH=$(docker inspect --format='{{if .State.Health}}yes{{else}}no{{end}}' "infra-${svc}-1" 2>/dev/null || echo "no")

                if [ "${HAS_HEALTH}" = "no" ]; then
                  # No healthcheck — just verify the container is running
                  RUNNING=$(docker inspect --format='{{.State.Running}}' "infra-${svc}-1" 2>/dev/null || echo "false")
                  if [ "${RUNNING}" = "true" ]; then
                    echo "  [OK] ${svc} is running (no healthcheck defined)"
                    break
                  fi
                else
                  STATUS=$(docker inspect --format='{{.State.Health.Status}}' "infra-${svc}-1" 2>/dev/null || echo "unknown")
                  if [ "${STATUS}" = "healthy" ]; then
                    echo "  [OK] ${svc} is healthy"
                    break
                  fi
                fi

                ATTEMPTS=$((ATTEMPTS + 1))
                if [ $ATTEMPTS -ge $MAX_ATTEMPTS ]; then
                  FINAL_STATUS=$(docker inspect --format='{{.State.Health.Status}}' "infra-${svc}-1" 2>/dev/null || echo "unknown")
                  echo "  [FAIL] ${svc} did not become healthy within 90s (status: ${FINAL_STATUS})"
                  HEALTH_OK=false
                fi
                sleep 5
              done
            done

            # ── 5. ROLLBACK on health check failure ──

            if [ "${HEALTH_OK}" != "true" ]; then
              echo ""
              echo "!!! HEALTH CHECK FAILED — INITIATING ROLLBACK !!!"
              echo ""

              if [ "${DEPLOY_API}" = "true" ] && [ -n "${API_OLD_DIGEST}" ]; then
                echo "==> Rolling back API to: ${API_OLD_DIGEST}"
                docker pull "${API_OLD_DIGEST}" 2>/dev/null || true
                docker tag "${API_OLD_DIGEST}" ghcr.io/codeupscale/trackflow-api:latest 2>/dev/null || true
                docker compose up -d --no-deps tf-app tf-horizon tf-scheduler tf-reverb
              fi

              if [ "${DEPLOY_WEB}" = "true" ] && [ -n "${WEB_OLD_DIGEST}" ]; then
                echo "==> Rolling back Web to: ${WEB_OLD_DIGEST}"
                docker pull "${WEB_OLD_DIGEST}" 2>/dev/null || true
                docker tag "${WEB_OLD_DIGEST}" ghcr.io/codeupscale/trackflow-web:latest 2>/dev/null || true
                docker compose up -d --no-deps tf-web
              fi

              if [ "${DEPLOY_MARKETING}" = "true" ] && [ -n "${MARKETING_OLD_DIGEST}" ]; then
                echo "==> Rolling back Marketing to: ${MARKETING_OLD_DIGEST}"
                docker pull "${MARKETING_OLD_DIGEST}" 2>/dev/null || true
                docker tag "${MARKETING_OLD_DIGEST}" ghcr.io/codeupscale/trackflow-marketing:latest 2>/dev/null || true
                docker compose up -d --no-deps tf-marketing
              fi

              echo "==> Rollback complete. Waiting for rollback containers..."
              sleep 15
              docker compose ps --format "table {{.Name}}\t{{.Status}}" | grep "tf-"
              echo ""
              echo "!!! DEPLOY FAILED — ROLLED BACK TO PREVIOUS VERSION !!!"
              exit 1
            fi

            # ── 6. SUCCESS: Report status ──

            echo ""
            echo "==> Deploy successful! Container status:"
            docker compose ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}" | grep "tf-"

            echo ""
            echo "==> Resource usage:"
            docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}" | grep "tf-"

            # ── 7. CLEANUP: Remove old images to reclaim disk ──

            echo ""
            echo "==> Pruning dangling images"
            docker image prune -f

            echo ""
            echo "==> Deploy complete (commit: ${COMMIT_SHA:0:8})"
