name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.18). Leave empty to use current package.json version.'
        required: false
        type: string
      platforms:
        description: 'Platforms to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - mac
          - windows
          - linux

permissions:
  contents: write

jobs:
  build-mac:
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'mac' }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Set version
        if: ${{ inputs.version != '' }}
        working-directory: desktop
        run: npm version ${{ inputs.version }} --no-git-tag-version --allow-same-version --allow-same-version

      - name: Build and publish macOS
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # When Apple Developer cert is ready, uncomment:
          # CSC_LINK: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          # CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --x64 --arm64 --publish always

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/latest-mac.yml
          retention-days: 5

  build-windows:
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'windows' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Set version
        if: ${{ inputs.version != '' }}
        working-directory: desktop
        run: npm version ${{ inputs.version }} --no-git-tag-version --allow-same-version

      - name: Build and publish Windows
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # When Windows code signing cert is ready, uncomment:
          # CSC_LINK: ${{ secrets.WIN_CERTIFICATE_P12 }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
        run: npx electron-builder --win --x64 --publish always

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            desktop/dist/*.exe
            desktop/dist/latest.yml
          retention-days: 5

  build-linux:
    if: ${{ inputs.platforms == 'all' || inputs.platforms == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build and publish Linux
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux --x64 --publish always

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/latest-linux.yml
          retention-days: 5

  update-release-notes:
    needs: [build-mac, build-windows, build-linux]
    if: always() && (needs.build-mac.result == 'success' || needs.build-windows.result == 'success' || needs.build-linux.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        working-directory: desktop
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          VER="${{ steps.version.outputs.version }}"
          gh release edit "$VERSION" --notes "## TrackFlow Desktop ${VER}

          ### Downloads

          | Platform | File | Notes |
          |----------|------|-------|
          | **macOS (Apple Silicon)** | \`TrackFlow-${VER}-mac-arm64.dmg\` | M1/M2/M3/M4 |
          | **macOS (Intel)** | \`TrackFlow-${VER}-mac-x64.dmg\` | 2020 and older |
          | **Windows** | \`TrackFlow-${VER}-win-x64.exe\` | Windows 10+ |
          | **Linux (.deb)** | \`TrackFlow-${VER}-linux-amd64.deb\` | Ubuntu/Debian |
          | **Linux (AppImage)** | \`TrackFlow-${VER}-x86_64.AppImage\` | Universal Linux |

          ---

          ### What's New

          **Bug Fixes**
          - Fixed pin/always-on-top not keeping window above other apps on macOS Sequoia — now uses NSFloatingWindowLevel + moveTop() re-asserted every 300ms
          - Fixed empty project list after logout and re-login
          - Fixed empty project list after laptop restart
          - Fixed password reset through web causing empty projects on desktop
          - Fixed Windows installer error \"Failed to uninstall old application files\" — app is now killed before install/uninstall
          - Fixed tray timer text showing blue/purple artifacts on macOS — now uses clean system color
          - Fixed timer window appearing with dark background instead of white
          - Fixed idle alert popup not showing after first idle cycle on macOS — window closure without action no longer breaks idle detection permanently

          **New Features**
          - **Pin / Always on Top** — thumbtack button in titlebar to keep the timer visible on top of other windows. Also available in tray right-click menu. State persists across restarts.

          **Improvements**
          - Added TrackFlow logo branding to login screen, titlebar, and idle alert
          - Added hide-to-tray button (X) in titlebar — minimizes to tray instead of quitting
          - Timer text turns green when actively tracking
          - Light theme enforced on timer window for better readability
          - Monospaced digits for timer display (no layout shift)

          ---

          ### Installation

          **macOS:**
          1. Download the \`.dmg\` for your chip (Apple Silicon or Intel)
          2. Open the DMG and drag TrackFlow to Applications
          3. **First launch only** — open Terminal and run:
             \`\`\`
             xattr -cr /Applications/TrackFlow.app
             \`\`\`
          4. Launch TrackFlow from Applications
          5. Grant **Screen Recording** permission when prompted (System Settings → Privacy & Security → Screen Recording)

          **Windows:**
          1. Download the \`.exe\` installer
          2. Run the installer — choose install location if needed
          3. Launch TrackFlow from Start Menu or Desktop shortcut
          4. If upgrading: the installer automatically closes the running app before updating

          **Linux (deb):**
          \`\`\`bash
          sudo dpkg -i TrackFlow-${VER}-linux-amd64.deb
          \`\`\`

          **Linux (AppImage):**
          \`\`\`bash
          chmod +x TrackFlow-${VER}-x86_64.AppImage
          ./TrackFlow-${VER}-x86_64.AppImage
          \`\`\`

          ---

          ### Uninstallation

          **macOS:**
          1. Quit TrackFlow (right-click tray icon → Quit)
          2. Drag TrackFlow from Applications to Trash
          3. To remove data: \`rm -rf ~/Library/Application\ Support/trackflow-agent\`

          **Windows:**
          1. Open Settings → Apps → Installed Apps
          2. Find TrackFlow → Uninstall
          3. Or run the uninstaller from Start Menu → TrackFlow → Uninstall
          4. To remove data: delete \`%APPDATA%/trackflow-agent\`

          **Linux:**
          \`\`\`bash
          # deb
          sudo dpkg -r trackflow-agent

          # AppImage — just delete the file
          rm TrackFlow-*.AppImage

          # Remove data
          rm -rf ~/.config/trackflow-agent
          \`\`\`

          ---

          ### Troubleshooting

          **macOS: \"app is damaged\" or won't open**
          \`\`\`bash
          xattr -cr /Applications/TrackFlow.app
          \`\`\`

          **macOS: Screen Recording permission**
          System Settings → Privacy & Security → Screen Recording → Enable TrackFlow.
          If TrackFlow is not listed, restart the app.

          **All platforms: \"Cannot reach the server\"**
          The server is likely reachable but your DNS cache is stale. Fix:
          - **macOS:** \`sudo dscacheutil -flushcache && sudo killall -HUP mDNSResponder\`
          - **Windows:** Run \`ipconfig /flushdns\` in Command Prompt (as Administrator)
          - **Linux:** \`sudo systemd-resolve --flush-caches\`
          Then retry login — no app restart needed.

          **Windows: \"Failed to uninstall old application files\"**
          This is fixed in v${VER}. The installer now automatically closes the running app.
          If you still see this on older versions, close TrackFlow from the system tray before running the installer.

          **Empty project list after login**
          Fixed in v${VER}. If you still experience this, try: Sign out → close app completely → reopen → sign in.

          **View logs:**
          - macOS: \`~/Library/Application Support/trackflow-agent/trackflow.log\`
          - Windows: \`%APPDATA%/trackflow-agent/trackflow.log\`
          - Linux: \`~/.config/trackflow-agent/trackflow.log\`
          "
