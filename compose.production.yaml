# Production Docker Compose for TrackFlow
# Tuned for shared server — total budget: ~1.4 CPU, ~1.4GB RAM
# Usage: docker compose -f compose.production.yaml up -d
services:
    app:
        build:
            context: .
            dockerfile: backend/Dockerfile.production
            args:
                NEXT_PUBLIC_API_URL: https://trackflow.codeupscale.com/api/v1
                NEXT_PUBLIC_REVERB_APP_KEY: trackflow-key
                NEXT_PUBLIC_REVERB_HOST: trackflow.codeupscale.com
                NEXT_PUBLIC_REVERB_PORT: '8081'
        restart: unless-stopped
        ports:
            - '${APP_PORT:-8080}:80'
        env_file: .env
        volumes:
            - ./backend/.env:/var/www/html/.env:ro
            - app-storage:/var/www/html/storage
        environment:
            APP_ENV: production
            APP_DEBUG: 'false'
            LOG_CHANNEL: stderr
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 384M
                    cpus: '0.75'
                reservations:
                    memory: 128M
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost/api/v1/health/live']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 30s
        networks:
            - production

    web:
        build:
            context: ./web
            dockerfile: Dockerfile.production
            args:
                NEXT_PUBLIC_API_URL: https://trackflow.codeupscale.com/api/v1
                NEXT_PUBLIC_REVERB_APP_KEY: trackflow-key
                NEXT_PUBLIC_REVERB_HOST: trackflow.codeupscale.com
                NEXT_PUBLIC_REVERB_PORT: '8081'
        restart: unless-stopped
        ports:
            - '3001:3000'
        environment:
            NODE_ENV: production
            # Limit V8 heap to prevent memory bloat in constrained container
            NODE_OPTIONS: '--max-old-space-size=160'
        depends_on:
            app:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 200M
                    cpus: '0.25'
        healthcheck:
            test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 30s
        networks:
            - production

    horizon:
        build:
            context: .
            dockerfile: backend/Dockerfile.production
        restart: unless-stopped
        command: php artisan horizon
        env_file: .env
        volumes:
            - ./backend/.env:/var/www/html/.env:ro
        environment:
            APP_ENV: production
            APP_DEBUG: 'false'
            LOG_CHANNEL: stderr
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 192M
                    cpus: '0.25'
        networks:
            - production

    scheduler:
        build:
            context: .
            dockerfile: backend/Dockerfile.production
        restart: unless-stopped
        command: '/bin/sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"'
        env_file: .env
        volumes:
            - ./backend/.env:/var/www/html/.env:ro
        environment:
            APP_ENV: production
            APP_DEBUG: 'false'
            LOG_CHANNEL: stderr
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 128M
                    cpus: '0.10'
        networks:
            - production

    reverb:
        build:
            context: .
            dockerfile: backend/Dockerfile.production
        restart: unless-stopped
        ports:
            - '${REVERB_PORT:-8081}:8080'
        command: php artisan reverb:start --host=0.0.0.0 --port=8080
        env_file: .env
        volumes:
            - ./backend/.env:/var/www/html/.env:ro
        environment:
            APP_ENV: production
            APP_DEBUG: 'false'
        depends_on:
            - redis
        deploy:
            resources:
                limits:
                    memory: 96M
                    cpus: '0.10'
        networks:
            - production

    pgsql:
        image: 'postgres:17-alpine'
        restart: unless-stopped
        ports:
            - '127.0.0.1:5433:5432'
        environment:
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD}'
        # Tune PostgreSQL for low-memory shared server
        command:
            - 'postgres'
            - '-c'
            - 'shared_buffers=64MB'
            - '-c'
            - 'effective_cache_size=128MB'
            - '-c'
            - 'work_mem=4MB'
            - '-c'
            - 'maintenance_work_mem=32MB'
            - '-c'
            - 'max_connections=40'
            - '-c'
            - 'wal_buffers=4MB'
            - '-c'
            - 'checkpoint_completion_target=0.9'
        volumes:
            - 'prod-pgsql:/var/lib/postgresql/data'
        networks:
            - production
        healthcheck:
            test: ['CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE}', '-U', '${DB_USERNAME}']
            interval: 10s
            retries: 5
            timeout: 5s
        deploy:
            resources:
                limits:
                    memory: 256M
                    cpus: '0.25'

    redis:
        image: 'redis:7-alpine'
        restart: unless-stopped
        command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 96mb --maxmemory-policy allkeys-lru --save ""
        volumes:
            - 'prod-redis:/data'
        networks:
            - production
        healthcheck:
            test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
            interval: 10s
            retries: 3
            timeout: 5s
        deploy:
            resources:
                limits:
                    memory: 128M
                    cpus: '0.10'

networks:
    production:
        driver: bridge

volumes:
    prod-pgsql:
        driver: local
    prod-redis:
        driver: local
    app-storage:
        driver: local
