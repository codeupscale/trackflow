# Production Docker Compose override
# Usage: docker compose -f compose.yaml -f compose.production.yaml up -d
services:
    app:
        build:
            context: .
            dockerfile: Dockerfile.production
        restart: unless-stopped
        ports:
            - '${APP_PORT:-80}:80'
        environment:
            APP_ENV: production
            APP_DEBUG: 'false'
            LOG_CHANNEL: stderr
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: '1.0'
                reservations:
                    memory: 256M
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost/api/v1/health/live']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 30s
        networks:
            - production

    horizon:
        build:
            context: .
            dockerfile: Dockerfile.production
        restart: unless-stopped
        command: php artisan horizon
        environment:
            APP_ENV: production
            APP_DEBUG: 'false'
            LOG_CHANNEL: stderr
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 256M
                    cpus: '0.5'
        networks:
            - production

    scheduler:
        build:
            context: .
            dockerfile: Dockerfile.production
        restart: unless-stopped
        command: '/bin/sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"'
        environment:
            APP_ENV: production
            APP_DEBUG: 'false'
            LOG_CHANNEL: stderr
        depends_on:
            pgsql:
                condition: service_healthy
            redis:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 128M
                    cpus: '0.25'
        networks:
            - production

    reverb:
        build:
            context: .
            dockerfile: Dockerfile.production
        restart: unless-stopped
        ports:
            - '${REVERB_PORT:-8080}:8080'
        command: php artisan reverb:start --host=0.0.0.0 --port=8080
        environment:
            APP_ENV: production
            APP_DEBUG: 'false'
        depends_on:
            - redis
        deploy:
            resources:
                limits:
                    memory: 128M
                    cpus: '0.25'
        networks:
            - production

    pgsql:
        image: 'postgres:18-alpine'
        restart: unless-stopped
        environment:
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - 'prod-pgsql:/var/lib/postgresql/data'
        networks:
            - production
        healthcheck:
            test: ['CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE}', '-U', '${DB_USERNAME}']
            interval: 10s
            retries: 5
            timeout: 5s
        deploy:
            resources:
                limits:
                    memory: 512M

    redis:
        image: 'redis:7-alpine'
        restart: unless-stopped
        command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
        volumes:
            - 'prod-redis:/data'
        networks:
            - production
        healthcheck:
            test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
            interval: 10s
            retries: 3
            timeout: 5s
        deploy:
            resources:
                limits:
                    memory: 256M

networks:
    production:
        driver: bridge

volumes:
    prod-pgsql:
        driver: local
    prod-redis:
        driver: local
