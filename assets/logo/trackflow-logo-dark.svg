<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" fill="none">
  <defs>
    <linearGradient id="dg1" x1="12" y1="188" x2="188" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="45%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="dg2" x1="100" y1="108" x2="138" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- === ICON MARK (same geometry, adjusted for dark bg) === -->
  <g transform="translate(8, 8) scale(0.36)">
    <!-- Clock arc -->
    <path d="M 108 362 A 180 180 0 1 1 348 108"
          stroke="url(#dg1)" stroke-width="48" stroke-linecap="round" fill="none"/>
    <!-- Arrowhead -->
    <path d="M 324 140 L 396 62 L 368 152 Z" fill="#06B6D4"/>
    <path d="M 324 140 L 396 62 L 368 152 Z" fill="url(#dg1)" opacity="0.25"/>
    <!-- Clock hand -->
    <line x1="256" y1="256" x2="330" y2="160"
          stroke="url(#dg2)" stroke-width="28" stroke-linecap="round"/>
    <!-- Center pivot -->
    <circle cx="256" cy="256" r="24" fill="#818CF8"/>
    <circle cx="256" cy="256" r="11" fill="#0f172a"/>
  </g>

  <!-- === WORDMARK (light text for dark backgrounds) === -->
  <text x="210" y="130"
        font-family="'Inter', 'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="76" font-weight="700" letter-spacing="-2.5">
    <tspan fill="#F1F5F9">Track</tspan><tspan fill="#A5B4FC">Flow</tspan>
  </text>
</svg>
