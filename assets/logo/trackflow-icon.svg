<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="g1" x1="60" y1="452" x2="452" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4338CA"/>
      <stop offset="45%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="g2" x1="256" y1="268" x2="345" y2="148" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <!-- Clock arc: ~255 degrees, round caps -->
  <path d="M 108 362
           A 180 180 0 1 1 348 108"
        stroke="url(#g1)" stroke-width="48" stroke-linecap="round" fill="none"/>

  <!-- Arrowhead: seamlessly extends from arc end -->
  <path d="M 324 140 L 396 62 L 368 152 Z" fill="#06B6D4"/>
  <path d="M 324 140 L 396 62 L 368 152 Z" fill="url(#g1)" opacity="0.25"/>

  <!-- Clock hand pointing to ~1:30 -->
  <line x1="256" y1="256" x2="330" y2="160"
        stroke="url(#g2)" stroke-width="28" stroke-linecap="round"/>

  <!-- Center pivot -->
  <circle cx="256" cy="256" r="24" fill="#6366F1"/>
  <circle cx="256" cy="256" r="11" fill="#ffffff"/>
</svg>
