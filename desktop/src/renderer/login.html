<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>TrackFlow — Login</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-card {
      width: 340px;
      padding: 32px;
      background: var(--bg-secondary);
      border-radius: 12px;
      border: 1px solid var(--bg-tertiary);
    }

    .logo {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: var(--accent-blue);
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .submit-btn {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      margin-top: 4px;
    }

    .error {
      color: var(--accent-red);
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      display: none;
      padding: 8px 12px;
      background: var(--error-bg);
      border-radius: 6px;
      border: 1px solid var(--error-border);
    }

    /* Password toggle */
    .password-wrap {
      position: relative;
    }
    .password-wrap input {
      padding-right: 40px;
    }
    .password-toggle {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.15s;
      padding: 0;
    }
    .password-toggle:hover {
      color: var(--text-primary);
    }
    .password-toggle:focus-visible {
      outline: 2px solid var(--accent-blue);
      outline-offset: -2px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <!-- Custom titlebar — identical on all platforms, replaces native frame -->
  <div class="titlebar" id="titlebar">
    <span class="titlebar-title">TrackFlow</span>
    <div class="titlebar-controls">
      <button class="titlebar-btn close" id="closeBtn" title="Close">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <div class="main">
    <div class="login-card">
      <div class="logo">TrackFlow</div>
      <div class="subtitle">Sign in to start tracking</div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@company.com" required autocomplete="email" autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="Your password" required autocomplete="current-password">
            <button
              type="button"
              class="password-toggle"
              id="passwordToggle"
              aria-label="Show password"
              aria-controls="password"
              aria-pressed="false"
              title="Show password"
            >
              <svg aria-hidden="true" id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
              <svg aria-hidden="true" id="eyeOffIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary submit-btn" id="submitBtn">Sign In</button>
      </form>

      <div class="error" id="errorMsg" role="alert" aria-live="polite"></div>
    </div>
  </div>

  <script>
    // ── OS Theme Detection ──
    function applyTheme(theme) {
      if (theme === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      } else {
        document.documentElement.removeAttribute('data-theme');
      }
    }
    window.trackflow.getTheme().then(applyTheme).catch(() => {});
    window.trackflow.onThemeChange(applyTheme);

    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    // Password visibility toggle
    const passwordInput = document.getElementById('password');
    const passwordToggle = document.getElementById('passwordToggle');
    const eyeIcon = document.getElementById('eyeIcon');
    const eyeOffIcon = document.getElementById('eyeOffIcon');
    passwordToggle.addEventListener('click', () => {
      const wasPassword = passwordInput.type === 'password';
      const nextType = wasPassword ? 'text' : 'password';

      const start = passwordInput.selectionStart;
      const end = passwordInput.selectionEnd;

      passwordInput.type = nextType;

      if (typeof start === 'number' && typeof end === 'number') {
        try {
          passwordInput.setSelectionRange(start, end);
        } catch (_) {
          // Selection APIs may throw on some platforms; safe to ignore.
        }
      }

      const nextIsPassword = nextType === 'password';
      eyeIcon.style.display = nextIsPassword ? 'block' : 'none';
      eyeOffIcon.style.display = nextIsPassword ? 'none' : 'block';

      const label = nextIsPassword ? 'Show password' : 'Hide password';
      passwordToggle.setAttribute('aria-label', label);
      passwordToggle.setAttribute('title', label);
      passwordToggle.setAttribute('aria-pressed', String(!nextIsPassword));
    });

    // Close button — works on all platforms (replaces native traffic lights / X button)
    document.getElementById('closeBtn').addEventListener('click', () => {
      window.close();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email) {
        errorMsg.textContent = 'Please enter your email';
        errorMsg.style.display = 'block';
        document.getElementById('email').focus();
        return;
      }
      if (!password) {
        errorMsg.textContent = 'Please enter your password';
        errorMsg.style.display = 'block';
        document.getElementById('password').focus();
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in\u2026';

      try {
        const result = await window.trackflow.login(email, password);
        if (result.error) {
          errorMsg.textContent = result.error;
          errorMsg.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      } catch (err) {
        errorMsg.textContent = 'Connection failed. Please check your internet.';
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });

    window.addEventListener('error', (e) => console.error('Login renderer error:', e.message));
  </script>
</body>
</html>
