<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>TrackFlow — Login</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .login-card {
      width: 340px;
      padding: 32px;
      background: #1e293b;
      border-radius: 12px;
      border: 1px solid #334155;
    }

    .logo {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: #3b82f6;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    .submit-btn {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      margin-top: 4px;
    }

    .error {
      color: #ef4444;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      display: none;
      padding: 8px 12px;
      background: rgba(239, 68, 68, 0.1);
      border-radius: 6px;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
  </style>
</head>
<body>
  <!-- Custom titlebar — identical on all platforms, replaces native frame -->
  <div class="titlebar" id="titlebar">
    <span class="titlebar-title">TrackFlow</span>
    <div class="titlebar-controls">
      <button class="titlebar-btn close" id="closeBtn" title="Close">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <div class="main">
    <div class="login-card">
      <div class="logo">TrackFlow</div>
      <div class="subtitle">Sign in to start tracking</div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@company.com" required autocomplete="email" autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary submit-btn" id="submitBtn">Sign In</button>
      </form>

      <div class="error" id="errorMsg" role="alert" aria-live="polite"></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    // Close button — works on all platforms (replaces native traffic lights / X button)
    document.getElementById('closeBtn').addEventListener('click', () => {
      window.close();
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email) {
        errorMsg.textContent = 'Please enter your email';
        errorMsg.style.display = 'block';
        document.getElementById('email').focus();
        return;
      }
      if (!password) {
        errorMsg.textContent = 'Please enter your password';
        errorMsg.style.display = 'block';
        document.getElementById('password').focus();
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in\u2026';

      try {
        const result = await window.trackflow.login(email, password);
        if (result.error) {
          errorMsg.textContent = result.error;
          errorMsg.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      } catch (err) {
        errorMsg.textContent = 'Connection failed. Please check your internet.';
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });

    window.addEventListener('error', (e) => console.error('Login renderer error:', e.message));
  </script>
</body>
</html>
