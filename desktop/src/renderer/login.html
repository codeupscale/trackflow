<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>TrackFlow — Login</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 28px;
    }

    .login-card {
      width: 100%;
      max-width: 340px;
      padding: 0;
      background: transparent;
      border: none;
      border-radius: 0;
    }

    /* .logo styles are in shared.css */

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .submit-btn {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      margin-top: 4px;
    }

    .error {
      color: var(--accent-red);
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      display: none;
      padding: 8px 12px;
      background: var(--error-bg);
      border-radius: 6px;
      border: 1px solid var(--error-border);
    }

    /* Password toggle */
    .password-wrap {
      position: relative;
    }
    .password-wrap input {
      padding-right: 40px;
    }
    .password-toggle {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.15s;
      padding: 0;
    }
    .password-toggle:hover {
      color: var(--text-primary);
    }
    .password-toggle:focus-visible {
      outline: 2px solid var(--accent-blue);
      outline-offset: -2px;
      border-radius: 4px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      margin: 20px 0;
      gap: 12px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }
    .divider span {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Google button */
    .google-btn {
      width: 100%;
      padding: 11px;
      font-size: 14px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-input);
      border-radius: 8px;
      color: var(--text-primary);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    .google-btn:hover {
      background: var(--bg-tertiary);
      border-color: var(--text-muted);
    }
    .google-btn:focus-visible {
      border-color: var(--accent-primary, var(--accent-blue));
      box-shadow: 0 0 0 3px var(--accent-primary-ring, var(--accent-blue-ring));
    }
    .google-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .google-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Organization selector */
    .org-selector {
      display: none;
    }
    .org-selector.visible {
      display: block;
    }
    .org-selector .subtitle {
      margin-bottom: 16px;
    }
    .org-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }
    .org-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-input);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-align: left;
      width: 100%;
      font-family: inherit;
      color: inherit;
    }
    .org-item:hover {
      background: var(--bg-tertiary);
      border-color: var(--text-muted);
    }
    .org-item:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .org-avatar {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--accent-primary-ring, rgba(196, 125, 46, 0.15));
      color: var(--accent-primary, var(--accent-blue));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .org-info {
      flex: 1;
      min-width: 0;
    }
    .org-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .org-role {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: capitalize;
    }
    .org-chevron {
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .back-btn {
      width: 100%;
      padding: 8px;
      font-size: 13px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
    }
    .back-btn:hover {
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <!-- Custom titlebar — identical on all platforms, replaces native frame -->
  <div class="titlebar" id="titlebar">
    <span class="titlebar-title">
      <svg class="titlebar-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
        <defs>
          <linearGradient id="ltg1" x1="60" y1="452" x2="452" y2="60" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#4338CA"/>
            <stop offset="45%" stop-color="#6366F1"/>
            <stop offset="100%" stop-color="#06B6D4"/>
          </linearGradient>
          <linearGradient id="ltg2" x1="256" y1="268" x2="345" y2="148" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#6366F1"/>
            <stop offset="100%" stop-color="#22D3EE"/>
          </linearGradient>
        </defs>
        <path d="M 108 362 A 180 180 0 1 1 348 108" stroke="url(#ltg1)" stroke-width="48" stroke-linecap="round" fill="none"/>
        <path d="M 324 140 L 396 62 L 368 152 Z" fill="#06B6D4"/>
        <path d="M 324 140 L 396 62 L 368 152 Z" fill="url(#ltg1)" opacity="0.25"/>
        <line x1="256" y1="256" x2="330" y2="160" stroke="url(#ltg2)" stroke-width="28" stroke-linecap="round"/>
        <circle cx="256" cy="256" r="24" fill="#6366F1"/>
        <circle cx="256" cy="256" r="11" fill="#ffffff"/>
      </svg>
      TrackFlow
    </span>
    <div class="titlebar-controls">
      <button class="titlebar-btn close" id="closeBtn" title="Close">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <div class="main">
    <!-- Login Form -->
    <div class="login-card" id="loginView">
      <div class="logo">
        <!-- Dark theme variant (default) -->
        <svg class="logo-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" fill="none">
          <defs>
            <linearGradient id="dg1" x1="12" y1="188" x2="188" y2="12" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#4338CA"/>
              <stop offset="45%" stop-color="#6366F1"/>
              <stop offset="100%" stop-color="#06B6D4"/>
            </linearGradient>
            <linearGradient id="dg2" x1="100" y1="108" x2="138" y2="62" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#6366F1"/>
              <stop offset="100%" stop-color="#22D3EE"/>
            </linearGradient>
          </defs>
          <g transform="translate(8, 8) scale(0.36)">
            <path d="M 108 362 A 180 180 0 1 1 348 108" stroke="url(#dg1)" stroke-width="48" stroke-linecap="round" fill="none"/>
            <path d="M 324 140 L 396 62 L 368 152 Z" fill="#06B6D4"/>
            <path d="M 324 140 L 396 62 L 368 152 Z" fill="url(#dg1)" opacity="0.25"/>
            <line x1="256" y1="256" x2="330" y2="160" stroke="url(#dg2)" stroke-width="28" stroke-linecap="round"/>
            <circle cx="256" cy="256" r="24" fill="#818CF8"/>
            <circle cx="256" cy="256" r="11" fill="#0f172a"/>
          </g>
          <text x="210" y="130" font-family="'Inter','SF Pro Display','Segoe UI',system-ui,-apple-system,sans-serif" font-size="76" font-weight="700" letter-spacing="-2.5">
            <tspan fill="#F1F5F9">Track</tspan><tspan fill="#A5B4FC">Flow</tspan>
          </text>
        </svg>
        <!-- Light theme variant -->
        <svg class="logo-light" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" fill="none">
          <defs>
            <linearGradient id="lg1" x1="12" y1="188" x2="188" y2="12" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#4338CA"/>
              <stop offset="45%" stop-color="#6366F1"/>
              <stop offset="100%" stop-color="#06B6D4"/>
            </linearGradient>
            <linearGradient id="lg2" x1="100" y1="108" x2="138" y2="62" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#6366F1"/>
              <stop offset="100%" stop-color="#22D3EE"/>
            </linearGradient>
          </defs>
          <g transform="translate(8, 8) scale(0.36)">
            <path d="M 108 362 A 180 180 0 1 1 348 108" stroke="url(#lg1)" stroke-width="48" stroke-linecap="round" fill="none"/>
            <path d="M 324 140 L 396 62 L 368 152 Z" fill="#06B6D4"/>
            <path d="M 324 140 L 396 62 L 368 152 Z" fill="url(#lg1)" opacity="0.25"/>
            <line x1="256" y1="256" x2="330" y2="160" stroke="url(#lg2)" stroke-width="28" stroke-linecap="round"/>
            <circle cx="256" cy="256" r="24" fill="#6366F1"/>
            <circle cx="256" cy="256" r="11" fill="#ffffff"/>
          </g>
          <text x="210" y="130" font-family="'Inter','SF Pro Display','Segoe UI',system-ui,-apple-system,sans-serif" font-size="76" font-weight="700" letter-spacing="-2.5">
            <tspan fill="#1e1b4b">Track</tspan><tspan fill="#4F46E5">Flow</tspan>
          </text>
        </svg>
      </div>
      <div class="subtitle">Sign in to start tracking</div>

      <!-- Google Sign-In Button -->
      <button type="button" class="google-btn" id="googleBtn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>

      <div class="divider"><span>or continue with email</span></div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@company.com" required autocomplete="email" autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="Your password" required autocomplete="current-password">
            <button
              type="button"
              class="password-toggle"
              id="passwordToggle"
              aria-label="Show password"
              aria-controls="password"
              aria-pressed="false"
              title="Show password"
            >
              <svg aria-hidden="true" id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
              <svg aria-hidden="true" id="eyeOffIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary submit-btn" id="submitBtn">Sign In</button>
      </form>

      <div class="error" id="errorMsg" role="alert" aria-live="polite"></div>
    </div>

    <!-- Organization Selector (shown when multi-org detected) -->
    <div class="login-card org-selector" id="orgView">
      <div class="logo">
        <!-- Dark theme variant (default) -->
        <svg class="logo-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" fill="none">
          <defs>
            <linearGradient id="dg1o" x1="12" y1="188" x2="188" y2="12" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#4338CA"/>
              <stop offset="45%" stop-color="#6366F1"/>
              <stop offset="100%" stop-color="#06B6D4"/>
            </linearGradient>
            <linearGradient id="dg2o" x1="100" y1="108" x2="138" y2="62" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#6366F1"/>
              <stop offset="100%" stop-color="#22D3EE"/>
            </linearGradient>
          </defs>
          <g transform="translate(8, 8) scale(0.36)">
            <path d="M 108 362 A 180 180 0 1 1 348 108" stroke="url(#dg1o)" stroke-width="48" stroke-linecap="round" fill="none"/>
            <path d="M 324 140 L 396 62 L 368 152 Z" fill="#06B6D4"/>
            <path d="M 324 140 L 396 62 L 368 152 Z" fill="url(#dg1o)" opacity="0.25"/>
            <line x1="256" y1="256" x2="330" y2="160" stroke="url(#dg2o)" stroke-width="28" stroke-linecap="round"/>
            <circle cx="256" cy="256" r="24" fill="#818CF8"/>
            <circle cx="256" cy="256" r="11" fill="#0f172a"/>
          </g>
          <text x="210" y="130" font-family="'Inter','SF Pro Display','Segoe UI',system-ui,-apple-system,sans-serif" font-size="76" font-weight="700" letter-spacing="-2.5">
            <tspan fill="#F1F5F9">Track</tspan><tspan fill="#A5B4FC">Flow</tspan>
          </text>
        </svg>
        <!-- Light theme variant -->
        <svg class="logo-light" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" fill="none">
          <defs>
            <linearGradient id="lg1o" x1="12" y1="188" x2="188" y2="12" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#4338CA"/>
              <stop offset="45%" stop-color="#6366F1"/>
              <stop offset="100%" stop-color="#06B6D4"/>
            </linearGradient>
            <linearGradient id="lg2o" x1="100" y1="108" x2="138" y2="62" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#6366F1"/>
              <stop offset="100%" stop-color="#22D3EE"/>
            </linearGradient>
          </defs>
          <g transform="translate(8, 8) scale(0.36)">
            <path d="M 108 362 A 180 180 0 1 1 348 108" stroke="url(#lg1o)" stroke-width="48" stroke-linecap="round" fill="none"/>
            <path d="M 324 140 L 396 62 L 368 152 Z" fill="#06B6D4"/>
            <path d="M 324 140 L 396 62 L 368 152 Z" fill="url(#lg1o)" opacity="0.25"/>
            <line x1="256" y1="256" x2="330" y2="160" stroke="url(#lg2o)" stroke-width="28" stroke-linecap="round"/>
            <circle cx="256" cy="256" r="24" fill="#6366F1"/>
            <circle cx="256" cy="256" r="11" fill="#ffffff"/>
          </g>
          <text x="210" y="130" font-family="'Inter','SF Pro Display','Segoe UI',system-ui,-apple-system,sans-serif" font-size="76" font-weight="700" letter-spacing="-2.5">
            <tspan fill="#1e1b4b">Track</tspan><tspan fill="#4F46E5">Flow</tspan>
          </text>
        </svg>
      </div>
      <div class="subtitle">Select an organization to continue</div>

      <div class="org-list" id="orgList"></div>

      <div class="error" id="orgErrorMsg" role="alert" aria-live="polite"></div>

      <button type="button" class="back-btn" id="backBtn">Back to login</button>
    </div>
  </div>

  <script src="login-renderer.js"></script>
</body>
</html>
