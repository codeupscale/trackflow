<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>TrackFlow</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body { height: 100vh; }

    .container {
      padding: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .content {
      padding: 12px 16px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ── Timer Display ──────────────────────────────────────── */
    .timer-display {
      text-align: center;
      padding: 20px 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .time {
      font-size: 42px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      transition: color 0.2s;
    }
    .time.running { color: var(--accent-green); }
    .time.stopped { color: var(--text-muted); }

    .status {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: var(--accent-green); animation: pulse 2s infinite; }
    .dot.gray { background: var(--text-muted); }

    /* ── Project Select ─────────────────────────────────────── */
    .select-wrap {
      margin: 8px 0;
    }

    /* ── Action Buttons ─────────────────────────────────────── */
    .actions {
      display: flex;
      gap: 8px;
      justify-content: center;
      padding: 8px 0;
    }
    .actions .btn {
      flex: 1;
      padding: 10px;
      font-size: 14px;
    }

    /* ── Footer ─────────────────────────────────────────────── */
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 10px;
      border-top: 1px solid var(--border-color);
      font-size: 11px;
    }

    /* ── Permission Warning Banner ─────────────────────────── */
    .permission-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      margin-bottom: 8px;
      border-radius: 8px;
      background: rgba(234, 179, 8, 0.12);
      border: 1px solid rgba(234, 179, 8, 0.3);
      font-size: 12px;
      color: var(--text-primary);
    }
    .permission-banner-text {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .permission-banner-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(234, 179, 8, 0.3);
      color: #eab308;
      font-weight: 700;
      font-size: 11px;
      flex-shrink: 0;
    }
    .permission-banner-btn {
      padding: 3px 10px;
      border-radius: 4px;
      border: 1px solid rgba(234, 179, 8, 0.4);
      background: rgba(234, 179, 8, 0.15);
      color: #eab308;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }
    .permission-banner-btn:hover {
      background: rgba(234, 179, 8, 0.25);
    }

    /* ── Update Dialog Overlay ────────────────────────────── */
    .update-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      animation: updateFadeIn 0.25s ease-out;
    }
    .update-overlay.visible {
      display: flex;
    }
    @keyframes updateFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes updateCardIn {
      from { opacity: 0; transform: scale(0.92) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .update-card {
      background: var(--bg-secondary, #171717);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 24px;
      max-width: 340px;
      width: calc(100% - 32px);
      text-align: center;
      animation: updateCardIn 0.3s ease-out;
    }
    .update-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }
    .update-icon svg {
      color: #3b82f6;
    }
    .update-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary, #fff);
      margin-bottom: 8px;
    }
    .update-body {
      font-size: 13px;
      color: var(--text-secondary, #a3a3a3);
      line-height: 1.5;
      margin-bottom: 20px;
    }
    .update-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .update-btn-primary {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #3b82f6;
      color: #fff;
      transition: background 0.15s;
    }
    .update-btn-primary:hover {
      background: #2563eb;
    }
    .update-btn-secondary {
      width: 100%;
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--text-secondary, #a3a3a3);
      transition: background 0.15s, border-color 0.15s;
    }
    .update-btn-secondary:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.2);
    }
    /* Update badge — shows after dismissing the dialog */
    .update-badge {
      display: none;
      position: absolute;
      top: 7px;
      right: 40px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3b82f6;
      cursor: pointer;
      animation: pulse 2s infinite;
    }
    .update-badge.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Custom titlebar — identical on all platforms -->
    <div class="titlebar" id="titlebar">
      <span class="titlebar-title">
        <svg class="titlebar-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
          <defs>
            <linearGradient id="tg1" x1="60" y1="452" x2="452" y2="60" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#4338CA"/>
              <stop offset="45%" stop-color="#6366F1"/>
              <stop offset="100%" stop-color="#06B6D4"/>
            </linearGradient>
            <linearGradient id="tg2" x1="256" y1="268" x2="345" y2="148" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#6366F1"/>
              <stop offset="100%" stop-color="#22D3EE"/>
            </linearGradient>
          </defs>
          <path d="M 108 362 A 180 180 0 1 1 348 108" stroke="url(#tg1)" stroke-width="48" stroke-linecap="round" fill="none"/>
          <path d="M 324 140 L 396 62 L 368 152 Z" fill="#06B6D4"/>
          <path d="M 324 140 L 396 62 L 368 152 Z" fill="url(#tg1)" opacity="0.25"/>
          <line x1="256" y1="256" x2="330" y2="160" stroke="url(#tg2)" stroke-width="28" stroke-linecap="round"/>
          <circle cx="256" cy="256" r="24" fill="#6366F1"/>
          <circle cx="256" cy="256" r="11" fill="#ffffff"/>
        </svg>
        TrackFlow
      </span>
      <div class="titlebar-controls">
        <span class="update-badge" id="updateBadge" title="Update available — click to show"></span>
        <button class="titlebar-btn" id="logoutBtn" title="Sign out">
          <!-- Logout icon (SVG) -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
        <button class="titlebar-btn pin-btn pinned" id="pinBtn" title="Always on top (pinned)">
          <!-- Pin/thumbtack icon (SVG) -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg>
        </button>
        <button class="titlebar-btn close" id="hideBtn" title="Hide to tray">
          <!-- Close/hide icon (SVG) -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div class="content">
      <!-- Permission warning banner — shown when Screen Recording is not granted -->
      <div class="permission-banner" id="permissionBanner" style="display:none" role="alert">
        <div class="permission-banner-text">
          <span class="permission-banner-icon" aria-hidden="true">!</span>
          <span>Screenshots disabled — permission needed</span>
        </div>
        <button class="permission-banner-btn" id="fixPermissionBtn">Fix</button>
      </div>

      <!-- Wallpaper-only warning — shown when captures appear to be wallpaper-only -->
      <div class="permission-banner" id="wallpaperBanner" style="display:none" role="alert">
        <div class="permission-banner-text">
          <span class="permission-banner-icon" aria-hidden="true">!</span>
          <span>Screenshots may be wallpaper-only</span>
        </div>
        <button class="permission-banner-btn" id="fixWallpaperBtn">Fix</button>
      </div>

      <div class="timer-display">
        <div class="time stopped" id="timerDisplay" role="timer" aria-live="polite">00:00:00</div>
        <div class="status">
          <span class="dot gray" id="statusDot" aria-hidden="true"></span>
          <span id="statusText">Stopped</span>
        </div>
      </div>

      <!-- Custom-styled select — identical on all platforms -->
      <div class="select-wrap">
        <select id="projectSelect" aria-label="Select project">
          <option value="">No Project</option>
        </select>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="startBtn">
          <span id="startBtnText">Start</span>
        </button>
        <button class="btn btn-danger" id="stopBtn" style="display:none">Stop</button>
      </div>

      <div class="footer">
        <a id="dashboardLink" class="link-primary" tabindex="0" role="link">Open Dashboard</a>
        <a id="logoutLink" tabindex="0" role="link" class="text-muted text-xs">Sign out</a>
      </div>
    </div>
  </div>

  <!-- Update Available Dialog -->
  <div class="update-overlay" id="updateOverlay" role="dialog" aria-modal="true" aria-labelledby="updateTitle">
    <div class="update-card">
      <div class="update-icon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </div>
      <div class="update-title" id="updateTitle">Update Available</div>
      <div class="update-body" id="updateBody">A new version is ready to install. Restart now to get the latest features and bug fixes.</div>
      <div class="update-actions">
        <button class="update-btn-primary" id="updateRestartBtn">Restart Now</button>
        <button class="update-btn-secondary" id="updateLaterBtn">Later</button>
      </div>
    </div>
  </div>

  <script src="index-renderer.js"></script>
</body>
</html>
