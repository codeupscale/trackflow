<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackFlow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }
    .container { padding: 16px; height: 100%; display: flex; flex-direction: column; }
    .header {
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 12px; border-bottom: 1px solid #1e293b;
    }
    .logo { font-size: 16px; font-weight: 700; color: #3b82f6; }
    .btn {
      -webkit-app-region: no-drag;
      padding: 6px 14px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-ghost { background: transparent; color: #94a3b8; }
    .btn-ghost:hover { color: #e2e8f0; }

    .timer-display {
      text-align: center; padding: 24px 0;
      flex: 1; display: flex; flex-direction: column; justify-content: center;
    }
    .time {
      font-size: 42px; font-weight: 700; font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
    }
    .time.running { color: #22c55e; }
    .time.stopped { color: #64748b; }
    .status { font-size: 13px; color: #64748b; margin-top: 4px; }
    .status .dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; margin-right: 4px; vertical-align: middle;
    }
    .dot.green { background: #22c55e; animation: pulse 2s infinite; }
    .dot.gray { background: #64748b; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .project-select {
      -webkit-app-region: no-drag;
      width: 100%; padding: 8px 12px; margin: 12px 0;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 6px; color: #e2e8f0; font-size: 13px;
      outline: none;
    }
    .project-select:focus { border-color: #3b82f6; }
    .project-select:disabled { opacity: 0.5; cursor: not-allowed; }

    .actions {
      display: flex; gap: 8px; justify-content: center; padding: 12px 0;
    }
    .actions .btn { flex: 1; padding: 10px; font-size: 14px; }
    .actions .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .footer {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 12px;
      border-top: 1px solid #1e293b; font-size: 11px; color: #475569;
    }
    .footer a {
      -webkit-app-region: no-drag;
      color: #64748b; cursor: pointer; text-decoration: none;
    }
    .footer a:hover { color: #94a3b8; }
    .footer .dashboard-link { color: #3b82f6; }
    .footer .dashboard-link:hover { color: #60a5fa; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="logo">TrackFlow</span>
      <button class="btn btn-ghost" id="logoutBtn">Logout</button>
    </div>

    <div class="timer-display">
      <div class="time stopped" id="timerDisplay">00:00:00</div>
      <div class="status">
        <span class="dot gray" id="statusDot"></span>
        <span id="statusText">Stopped</span>
      </div>
    </div>

    <select class="project-select" id="projectSelect">
      <option value="">No Project</option>
    </select>

    <div class="actions">
      <button class="btn btn-primary" id="startBtn">Start</button>
      <button class="btn btn-danger" id="stopBtn" style="display:none">Stop</button>
    </div>

    <div class="footer">
      <a id="dashboardLink" class="dashboard-link">Open Dashboard</a>
      <a id="logoutLink">Sign out</a>
    </div>
  </div>

  <script>
    let timerInterval = null;
    let elapsedSeconds = 0;
    let todayTotalBase = 0; // Current day total (00:00–23:59 server time), per selected project
    let isRunning = false;
    let currentStartedAt = null;

    function showNotification(msg) {
      const el = document.createElement('div');
      el.style.cssText = 'position:fixed;top:8px;left:50%;transform:translateX(-50%);background:#ef4444;color:white;padding:6px 16px;border-radius:6px;font-size:12px;z-index:999;opacity:1;transition:opacity 0.3s;';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
    }

    const timerDisplay = document.getElementById('timerDisplay');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const projectSelect = document.getElementById('projectSelect');
    const logoutBtn = document.getElementById('logoutBtn');
    const logoutLink = document.getElementById('logoutLink');
    const dashboardLink = document.getElementById('dashboardLink');

    function formatTime(seconds) {
      const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
      const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    // Calculate elapsed time from server's started_at timestamp
    function calcElapsedFromStartedAt() {
      if (!currentStartedAt) return 0;
      return Math.max(0, Math.floor((Date.now() - new Date(currentStartedAt).getTime()) / 1000));
    }

    function updateDisplay(running) {
      isRunning = running;
      timerDisplay.textContent = formatTime(elapsedSeconds);
      timerDisplay.className = `time ${running ? 'running' : 'stopped'}`;
      statusDot.className = `dot ${running ? 'green' : 'gray'}`;
      statusText.textContent = running ? 'Tracking' : (todayTotalBase > 0 ? 'Today\'s Total' : 'Stopped');
      startBtn.style.display = running ? 'none' : 'block';
      stopBtn.style.display = running ? 'block' : 'none';
      projectSelect.disabled = running;
      updateStartButtonState();
    }

    // Start is only allowed when a project is selected (required for tracking)
    function updateStartButtonState() {
      const noProject = !projectSelect.value || projectSelect.value === '';
      startBtn.disabled = !isRunning && noProject;
    }

    function startTicking() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        // Show today's total (completed + current running)
        elapsedSeconds = todayTotalBase + calcElapsedFromStartedAt();
        timerDisplay.textContent = formatTime(elapsedSeconds);
      }, 1000);
    }

    function stopTicking() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    // Sync timer state from main process — current day total (00:00–23:59) for selected project
    async function syncTimerState() {
      try {
        await loadProjects();
        const selectedProjectId = projectSelect.value || null;
        const state = await window.trackflow.getTimerState(selectedProjectId);
        todayTotalBase = state.todayTotal ?? 0;

        if (state.isRunning) {
          currentStartedAt = state.entry?.started_at || null;
          const currentElapsed = state.elapsed || calcElapsedFromStartedAt();
          // When running, todayTotal from server includes current elapsed
          // Base = todayTotal - currentElapsed (completed entries only)
          todayTotalBase = Math.max(0, todayTotalBase - currentElapsed);
          elapsedSeconds = todayTotalBase + currentElapsed;
          updateDisplay(true);
          startTicking();
        } else {
          currentStartedAt = null;
          stopTicking();
          // Show today's total when stopped (not 00:00:00)
          elapsedSeconds = todayTotalBase;
          updateDisplay(false);
        }

        // Select current project if timer is running
        if (state.entry && state.entry.project_id) {
          projectSelect.value = state.entry.project_id;
        }
        updateStartButtonState();
      } catch (e) {
        console.error('Failed to sync timer state:', e);
      }
    }

    // Fetch projects and refresh dropdown (called on init and every time popup opens so newly assigned projects appear)
    async function loadProjects() {
      try {
        const projects = await window.trackflow.getProjects();
        const list = Array.isArray(projects) ? projects
          : (projects?.data && Array.isArray(projects.data)) ? projects.data
          : [];

        const currentValue = projectSelect.value || '';
        projectSelect.innerHTML = '<option value="">No Project</option>';
        list.forEach(p => {
          const option = document.createElement('option');
          option.value = p.id;
          option.textContent = p.name;
          projectSelect.appendChild(option);
        });
        if (currentValue && list.some(p => p.id === currentValue)) {
          projectSelect.value = currentValue;
        }
      } catch {}
    }

    // Load initial state
    async function init() {
      await loadProjects();
      await syncTimerState();
      updateStartButtonState();
      projectSelect.addEventListener('change', () => {
        updateStartButtonState();
        if (!isRunning) syncTimerState();
      });
    }

    startBtn.addEventListener('click', async () => {
      startBtn.disabled = true;
      startBtn.textContent = 'Starting...';
      const projectId = projectSelect.value || null;
      try {
        const result = await window.trackflow.startTimer(projectId);
        if (result.success) {
          currentStartedAt = result.entry?.started_at || new Date().toISOString();
          // todayTotalBase keeps accumulated completed time
          if (result.todayTotal > 0) {
            todayTotalBase = result.todayTotal;
          }
          elapsedSeconds = todayTotalBase;
          updateDisplay(true);
          startTicking();
        } else if (result.error) {
          showNotification(result.error);
        }
      } catch (e) {
        showNotification('Failed to start timer');
      }
      startBtn.disabled = false;
      startBtn.textContent = 'Start';
    });

    stopBtn.addEventListener('click', () => {
      // Update UI IMMEDIATELY — don't wait for network
      stopTicking();
      const stoppedTotal = elapsedSeconds; // Capture current displayed time
      currentStartedAt = null;
      todayTotalBase = stoppedTotal;
      elapsedSeconds = stoppedTotal;
      updateDisplay(false);

      // Fire-and-forget — don't await, so the UI never blocks
      window.trackflow.stopTimer().then((result) => {
        if (result && result.todayTotal > 0 && result.todayTotal !== stoppedTotal) {
          todayTotalBase = result.todayTotal;
          elapsedSeconds = result.todayTotal;
          updateDisplay(false);
        }
      }).catch(() => {});
    });

    // Both logout buttons do the same thing
    async function handleLogout() {
      logoutBtn.disabled = true;
      stopTicking();
      await window.trackflow.logout();
    }
    logoutBtn.addEventListener('click', handleLogout);
    logoutLink.addEventListener('click', handleLogout);

    // Open web dashboard in browser
    dashboardLink.addEventListener('click', () => {
      window.trackflow.openDashboard();
    });

    // Events from main process (timer sync, background state changes)
    window.trackflow.onTimerStarted((data) => {
      currentStartedAt = data?.started_at || new Date().toISOString();
      // Use todayTotal from server if available
      if (data?.todayTotal > 0) {
        todayTotalBase = data.todayTotal;
      }
      elapsedSeconds = todayTotalBase + calcElapsedFromStartedAt();
      updateDisplay(true);
      startTicking();
    });

    window.trackflow.onTimerStopped((data) => {
      stopTicking();
      currentStartedAt = null;
      if (data?.entry?.project_id) {
        projectSelect.value = data.entry.project_id;
        todayTotalBase = data.todayTotal ?? 0;
      } else if (data?.todayTotal !== undefined) {
        todayTotalBase = data.todayTotal;
      } else {
        syncTimerState();
        return;
      }
      elapsedSeconds = todayTotalBase;
      updateDisplay(false);
    });

    // Re-sync when popup window becomes visible again (user clicked tray icon)
    window.trackflow.onSyncTimer(() => {
      syncTimerState();
    });

    init();
  </script>
</body>
</html>
