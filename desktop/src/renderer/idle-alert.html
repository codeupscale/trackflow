<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrackFlow — Idle Alert</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      padding: 24px;
      width: 100%;
      text-align: center;
    }

    .icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.9;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      color: #f59e0b;
      margin-bottom: 8px;
    }

    .message {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .idle-time {
      font-size: 32px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #f59e0b;
      margin: 16px 0;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 12px;
      color: #64748b;
      margin-bottom: 20px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
    }

    .btn-keep {
      background: #22c55e;
      color: white;
    }
    .btn-keep:hover { background: #16a34a; }

    .btn-discard {
      background: #f59e0b;
      color: #0f172a;
    }
    .btn-discard:hover { background: #d97706; }

    .btn-stop {
      background: #ef4444;
      color: white;
    }
    .btn-stop:hover { background: #dc2626; }

    .btn-desc {
      font-size: 11px;
      color: #64748b;
      margin-top: -4px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⏸️</div>
    <div class="title">You appear to be idle</div>
    <div class="message">No keyboard or mouse activity detected</div>
    <div class="idle-time" id="idleTime">00:00</div>
    <div class="subtitle">idle time</div>

    <div class="actions">
      <button class="btn btn-keep" id="keepBtn">Keep Idle Time</button>
      <div class="btn-desc">Continue tracking — idle time counts as work</div>

      <button class="btn btn-discard" id="discardBtn">Discard Idle Time</button>
      <div class="btn-desc">Continue tracking — remove idle period from time entry</div>

      <button class="btn btn-stop" id="stopBtn">Stop Timer</button>
      <div class="btn-desc">Stop tracking completely</div>
    </div>
  </div>

  <script>
    const idleTimeEl = document.getElementById('idleTime');
    let idleStartMs = Date.now();
    let tickInterval = null;

    function formatIdleTime(seconds) {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      if (seconds >= 3600) {
        const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
        return `${h}:${m}:${s}`;
      }
      return `${m}:${s}`;
    }

    function startTicking() {
      tickInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - idleStartMs) / 1000);
        idleTimeEl.textContent = formatIdleTime(elapsed);
      }, 1000);
    }

    // Receive idle start time from main process
    window.trackflow.onIdleData((data) => {
      if (data.idleStartedAt) {
        idleStartMs = data.idleStartedAt;
      }
      const elapsed = Math.floor((Date.now() - idleStartMs) / 1000);
      idleTimeEl.textContent = formatIdleTime(elapsed);
      startTicking();
    });

    document.getElementById('keepBtn').addEventListener('click', () => {
      window.trackflow.resolveIdle('keep');
    });

    document.getElementById('discardBtn').addEventListener('click', () => {
      window.trackflow.resolveIdle('discard');
    });

    document.getElementById('stopBtn').addEventListener('click', () => {
      window.trackflow.resolveIdle('stop');
    });
  </script>
</body>
</html>
